name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-18
        run: sudo apt-get install -y clang-18 lld-18

      - name: Cache PS5 Payload SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/ps5-payload-sdk
          key: ps5-payload-sdk-latest

      - name: Download PS5 Payload SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/ps5-payload-dev/sdk/releases/latest/download/ps5-payload-sdk.zip
          sudo unzip -d /opt ps5-payload-sdk.zip
          rm ps5-payload-sdk.zip

      - name: Build
        run: |
          export PS5_PAYLOAD_SDK=/opt/ps5-payload-sdk
          source $PS5_PAYLOAD_SDK/toolchain/prospero.sh
          make clean all

      - uses: actions/upload-artifact@v4
        with:
          name: ps5-backpork
          path: ps5-backpork.elf
